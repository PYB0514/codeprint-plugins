# jar/zip 등 바이너리 아카이브 내부까지 풀어서 시크릿 패턴을 검사하는 게이트
# (GitHub Push Protection은 압축 아카이브 내부 콘텐츠까지는 스캔하지 못해 별도로 필요 — 2026-07-12 유출 사고 재발 방지)
name: Binary Secret Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan archive contents for secret patterns
        run: |
          set -euo pipefail
          FOUND=0
          WORKDIR=$(mktemp -d)

          for archive in $(find . -type f \( -name "*.jar" -o -name "*.zip" \)); do
            echo "검사 중: $archive"
            EXTRACT_DIR="$WORKDIR/$(basename "$archive")"
            mkdir -p "$EXTRACT_DIR"
            unzip -qq -o "$archive" -d "$EXTRACT_DIR" || continue

            # 1) 파일명 자체가 로컬 전용 secret 프로필인 경우 (application-local.yml 등)
            if find "$EXTRACT_DIR" -iname "application-*.yml" ! -iname "application.yml" | grep -q .; then
              echo "::error file=$archive::로컬 전용 프로필 파일(application-*.yml)이 아카이브에 포함되어 있습니다"
              find "$EXTRACT_DIR" -iname "application-*.yml" ! -iname "application.yml"
              FOUND=1
            fi

            # 2) 알려진 시크릿 패턴(AWS 액세스 키, PEM 개인키 헤더, 일반 secret/password 필드) 검사
            if grep -rIlE "AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY-----|(secret|password|token)[[:space:]]*:[[:space:]]*[^$][^{[:space:]]{8,}" "$EXTRACT_DIR" 2>/dev/null; then
              echo "::error file=$archive::아카이브 내부에서 시크릿으로 의심되는 패턴이 발견됐습니다"
              FOUND=1
            fi

            rm -rf "$EXTRACT_DIR"
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "시크릿 의심 패턴이 발견되어 빌드를 실패시킵니다."
            exit 1
          fi
          echo "바이너리 아카이브 시크릿 스캔 통과."
